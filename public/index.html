<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatbot AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 750px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #1a1a2e;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,200,255,0.1);
    }

    .header {
      background: #16213e;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #0f3460;
    }

    .header h1 {
      color: #00d4ff;
      font-size: 1.4rem;
      letter-spacing: 2px;
    }

    .header p {
      color: #888;
      font-size: 0.8rem;
      margin-top: 4px;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-box::-webkit-scrollbar { width: 6px; }
    .chat-box::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 10px; }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .bubble.user {
      background: #0f3460;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.ai {
      background: #16213e;
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #0f3460;
    }

    .bubble.typing {
      color: #888;
      font-style: italic;
    }

    .input-area {
      padding: 16px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid #0f3460;
      background: #0f0f1a;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }

    input:focus { border-color: #00d4ff; }

    button {
      padding: 12px 20px;
      border-radius: 24px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
      transition: 0.2s;
    }

    #sendBtn {
      background: #00d4ff;
      color: #0f0f1a;
    }

    #sendBtn:hover { background: #00b8d9; }

    #clearBtn {
      background: #ff4757;
      color: #fff;
    }

    #clearBtn:hover { background: #e03e4e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚡ CHATBOT AI</h1>
      <p>Powered by Groq · Llama 3.3 70B</p>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="bubble ai">Halo! Saya AI assistant kamu. Ada yang bisa saya bantu? 😊</div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ketik pesan..." />
      <button id="clearBtn">🗑️</button>
      <button id="sendBtn">Kirim</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");

    function addBubble(text, role) {
      const div = document.createElement("div");
      div.classList.add("bubble", role);
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    async function kirimPesan() {
      const pesan = userInput.value.trim();
      if (!pesan) return;

      addBubble(pesan, "user");
      userInput.value = "";
      sendBtn.disabled = true;

      const typing = addBubble("AI sedang mengetik...", "ai");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pesan }),
        });

        const data = await res.json();
        typing.remove();
        addBubble(data.reply, "ai");

      } catch (err) {
        typing.remove();
        addBubble("Error: " + err.message, "ai");
      }

      sendBtn.disabled = false;
      userInput.focus();
    }

    sendBtn.addEventListener("click", kirimPesan);

    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") kirimPesan();
    });

    clearBtn.addEventListener("click", async () => {
      await fetch("/clear", { method: "DELETE" });
      chatBox.innerHTML = '<div class="bubble ai">Riwayat dihapus! Mulai percakapan baru 😊</div>';
    });
  </script>
</body>
</html>
